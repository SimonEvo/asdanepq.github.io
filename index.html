<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<title>EPQ Supervisor System</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f5f6fa;
margin:0;
}

h1{
margin:30px;
}

/* 登录页面 */

#loginPage{
display:flex;
height:100vh;
align-items:center;
justify-content:center;
}

.loginBox{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

.loginBox input{
padding:10px;
width:200px;
margin-top:10px;
}

.loginBox button{
margin-top:10px;
padding:10px 16px;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
}

#error{
color:red;
font-size:14px;
margin-top:10px;
}

/* Dashboard */

#dashboard{
display:none;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
transition:0.2s;
}

.card:hover{
transform:translateY(-3px);
}

.name{
font-size:20px;
font-weight:bold;
}

.topic{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.tag{
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:12px;
color:white;
margin-bottom:10px;
}

.stage-research{background:#3498db;}
.stage-proposal{background:#f39c12;}
.stage-planning{background:#9b59b6;}
.stage-writing{background:#27ae60;}

.progressbar{
height:8px;
background:#eee;
border-radius:6px;
overflow:hidden;
margin:8px 0;
}

.progress{
height:8px;
background:#4CAF50;
}

.task{
font-size:13px;
margin-top:10px;
color:#444;
}

.button{
display:inline-block;
margin-top:10px;
padding:6px 10px;
background:#4CAF50;
color:white;
border-radius:6px;
font-size:13px;
text-decoration:none;
}

.button:hover{
background:#45a049;
}

</style>

</head>


<body>


<!-- 登录页面 -->

<div id="loginPage">

<div class="loginBox">

<h2>EPQ Supervisor System</h2>

<p>Password required</p>

<input id="passwordInput" type="password" placeholder="Enter password">

<br>

<button onclick="checkPassword()">Login</button>

<p id="error"></p>

</div>

</div>



<!-- Dashboard -->

<div id="dashboard">

<h1>EPQ Supervisor Dashboard</h1>

<div id="studentGrid" class="grid"></div>

</div>



<script>

const PASSWORD = "epq2026"

let students=[]
let tasks=[]



function checkPassword(){

let input=document.getElementById("passwordInput").value

if(input===PASSWORD){

document.getElementById("loginPage").style.display="none"
document.getElementById("dashboard").style.display="block"

loadData()

}else{

document.getElementById("error").innerText="Wrong password"

}

}



function loadData(){

Promise.all([
fetch("students.csv").then(r=>r.text()),
fetch("tasks.csv").then(r=>r.text())
])
.then(([studentText,taskText])=>{

students=parseCSV(studentText)
tasks=parseCSV(taskText)

renderStudents()

})

}



function parseCSV(text){

let rows=text.trim().split("\n")
let headers=rows.shift().split(",")

return rows.map(row=>{

let cols=row.split(",")

let obj={}

headers.forEach((h,i)=>{
obj[h]=cols[i]
})

return obj

})

}



function getNextTask(studentId){

let list=tasks.filter(t=>t.student_id==studentId && t.status!="done")

if(list.length==0)return "All tasks completed"

return list[0].task

}



function stageClass(stage){

stage=stage.toLowerCase()

if(stage.includes("research")) return "stage-research"
if(stage.includes("proposal")) return "stage-proposal"
if(stage.includes("planning")) return "stage-planning"
if(stage.includes("writing")) return "stage-writing"

return "stage-research"

}



function renderStudents(){

let grid=document.getElementById("studentGrid")

students.forEach(s=>{

let card=document.createElement("div")
card.className="card"

let task=getNextTask(s.id)

card.innerHTML=`

<div class="name">${s.name}</div>

<div class="topic">${s.topic}</div>

<div class="tag ${stageClass(s.stage)}">
${s.stage}
</div>

<div class="progressbar">
<div class="progress" style="width:${s.progress}%"></div>
</div>

<div>${s.progress}% complete</div>

<div class="task">
Next task: ${task}
</div>

<a class="button"
href="bear://x-callback-url/open-tag?name=${s.name}">
Notes
</a>

`

grid.appendChild(card)

})

}

</script>

</body>

</html>
