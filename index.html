<!DOCTYPE html>
<html>
<head>
<title>EPQ Dashboard</title>
</head>

<body>

<h1>EPQ Supervisor Dashboard</h1>

<h2>Students</h2>

<table id="students"></table>

<script>

fetch('students.csv')
.then(res => res.text())
.then(text => {

let rows = text.split("\n");
let table = document.getElementById("students");

rows.forEach(r=>{
let cols = r.split(",");
let tr = document.createElement("tr");

cols.forEach(c=>{
let td=document.createElement("td");
td.innerText=c;
tr.appendChild(td);
});

table.appendChild(tr);
});

});

</script>

</body>
</html>
