<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>EPQ Dashboard</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
text-align:center;
margin-top:120px;
}

#loginBox{
background:white;
width:300px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
padding:8px;
width:200px;
margin-top:10px;
}

button{
margin-top:10px;
padding:8px 14px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
}

#mainSite{
display:none;
}

</style>

</head>


<body>

<div id="loginBox">

<h2>EPQ System</h2>
<p>Password required</p>

<input id="passwordInput" type="password" placeholder="Enter password">

<br>

<button onclick="checkPassword()">Login</button>

<p id="error" style="color:red;"></p>

</div>



<div id="mainSite">

<h1>EPQ Supervisor Dashboard</h1>

<p>系统内容在这里（你的学生卡片代码）</p>

</div>



<script>

const PASSWORD = "epq2026"

function checkPassword(){

let input = document.getElementById("passwordInput").value

if(input === PASSWORD){

document.getElementById("loginBox").style.display="none"
document.getElementById("mainSite").style.display="block"

}else{

document.getElementById("error").innerText="Wrong password"

}

}

</script>

</body>

</html>
